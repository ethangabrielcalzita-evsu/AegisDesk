{% extends "incident_core/base.html" %}

{% block content %}
<div class="row justify-content-center text-center mt-5">
    <div class="col-md-8">
        <div class="card aegis-card p-5 border-success border-top border-5">
            <div class="card-body">
                <h1 class="display-1 text-success mb-3">✓</h1>
                <h2 class="mb-3">Ticket Processed Safely</h2>
                <p class="lead text-muted mb-4">
                    The incident state changes have been securely recorded in the AegisDesk audit database with a strict chain of custody. IT Management has been notified.
                </p>
                <a href="{% url 'submit_ticket' %}" class="btn btn-outline-primary px-4 py-2">
                    Log Another Incident
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
