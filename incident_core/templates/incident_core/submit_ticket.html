{% extends "incident_core/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card aegis-card mt-3">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0">Log Security Incident</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4">Please detail the security breach or IT failure below. This data will be securely logged directly to the NIST containment database.</p>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Submit Incident Report</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
